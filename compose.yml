services:
  postgres:
    image: postgres:16
    container_name: qts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader_pwd
    ports:
      - "5432:5432"
    volumes:
      - qts_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qts_pgdata:
