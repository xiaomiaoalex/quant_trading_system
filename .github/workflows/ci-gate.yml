name: CI Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  import-gate:
    name: Import Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import Gate Tests
        run: |
          python -c "import trader.tests.test_binance_connector"
          python -c "import trader.tests.test_binance_private_stream"
          python -c "import trader.tests.test_binance_degraded_cascade"

  p0-gate:
    name: P0 Regression Tests
    runs-on: ubuntu-latest
    needs: import-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run P0 Tests
        run: |
          python -m pytest -q trader/tests/test_binance_connector.py --tb=short || exit 1
          python -m pytest -q trader/tests/test_binance_private_stream.py --tb=short || exit 1
          python -m pytest -q trader/tests/test_binance_degraded_cascade.py --tb=short || exit 1

  control-gate:
    name: Control Gate
    runs-on: ubuntu-latest
    needs: p0-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Control Tests
        run: |
          python -m pytest -q trader/tests/test_api_endpoints.py -k "risk and (invalid_payload or missing_required_fields)" --tb=short || exit 1
          python -m pytest -q trader/tests/test_binance_degraded_cascade.py -k "local_killswitch or no_report_storm" --tb=short || exit 1
          python -m pytest -q trader/tests/test_hard_properties.py -k "fail_closed or cooldown_no_storm" --tb=short || exit 1
